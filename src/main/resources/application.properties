# ===============================
# APPLICATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/intern_db
spring.datasource.username=root
spring.datasource.password=qwertyuioplkm
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# LOGGING (IMPORTANT FOR DEBUGGING)
# ===============================
logging.level.org.springframework=INFO
logging.level.com.studygroup=DEBUG

# ===============================
# MULTIPART FILE UPLOAD SETTINGS
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# EMAIL CONFIGURATION (SMTP - GMAIL)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password

# SMTP PROPERTIES
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# EMAIL FEATURE TOGGLE (CUSTOM)
# ===============================
app.email.enabled=false

# ===============================
# OPTIONAL PERFORMANCE TUNING
# ===============================
spring.jpa.open-in-view=false
spring.datasource.hikari.maximum-pool-size=10

# ===============================
# OPTIONAL: FILE STORAGE (FUTURE USE)
# ===============================
server.port=8080

# ===============================
# EMAIL (Gmail SMTP)
# ---------------------------------------------------------------
# REQUIRED SETUP — do this once:
#   1. Go to your Google Account > Security
#   2. Enable 2-Step Verification
#   3. Go to App passwords > create one for "StudyConnect"
