spring.application.name=backend

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/intern_db
spring.datasource.username=root
spring.datasource.password=qwertyuioplkm
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# MULTIPART FILE UPLOAD SETTINGS
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# EMAIL (Gmail SMTP)
# ---------------------------------------------------------------
# REQUIRED SETUP — do this once:
#   1. Go to your Google Account > Security
#   2. Enable 2-Step Verification
#   3. Go to App passwords > create one for "StudyConnect"
#   4. Replace the values below with YOUR Gmail and the 16-char app password
#   5. Set app.mail.enabled=true
# ---------------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=studyconnectapp2025@gmail.com
spring.mail.password=your-16-char-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=studyconnectapp2025@gmail.com
# ← SET THIS TO true AFTER filling in real credentials above
app.mail.enabled=true
